<!DOCTYPE html>
<html>

<head>
    <title>DocParse - Search</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 400px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        input[type="file"],
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            background: #f1f3f5;
            padding: 15px;
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
        }

        .result p {
            margin: 5px 0;
            padding: 5px;
            background: white;
            border-radius: 4px;
            border-left: 4px solid #007bff;
        }

        .no-result {
            color: red;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>DocParse Search</h2>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file">
            <input type="text" name="search_text" placeholder="search">
            <button type="submit">Search</button>
        </form>

        {% if result %}
        <div class="result">
            {% for line in result %}
            {% if line == "searched data is not present" %}
            <p class="no-result">{{ line }}</p>
            {% else %}
            <p>{{ line }}</p>
            {% endif %}
            {% endfor %}
        </div>
        {% endif %}
    </div>

</body>

</html>
